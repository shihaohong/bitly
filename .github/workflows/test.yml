name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE USER bitly WITH PASSWORD 'bitly';"
          psql -h localhost -U postgres -c "CREATE DATABASE bitly_test OWNER bitly;"

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://bitly:bitly@localhost:5432/bitly_test
        run: go test -p 1 -race ./...
